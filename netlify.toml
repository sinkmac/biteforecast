[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

# Forms: ensure ignore_html_forms is false in the Netlify dashboard under
# Site settings > Build & deploy > Processing > Advanced settings.
# Without this, Netlify won't detect or accept any <form> submissions.
# This MUST also be set via the API (processing_settings.ignore_html_forms=false)
# to take effect — the TOML alone cannot set this field.

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/scotland/skye"
  to = "/scotland/isle-of-skye-midges"
  status = 301

[[redirects]]
  from = "/scotland/skye-midges"
  to = "/scotland/isle-of-skye-midges"
  status = 301

[[redirects]]
  from = "/scotland/glencoe"
  to = "/scotland/glencoe-midges"
  status = 301

[[redirects]]
  from = "/scotland/fort-william"
  to = "/scotland/fort-william-midges"
  status = 301

[[redirects]]
  from = "/scotland/loch-lomond"
  to = "/scotland/loch-lomond-midges"
  status = 301

[[redirects]]
  from = "/scotland/aviemore"
  to = "/scotland/aviemore-midges"
  status = 301

[[redirects]]
  from = "/scotland/mull"
  to = "/scotland/mull-midges"
